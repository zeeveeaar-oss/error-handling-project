<!DOCTYPE html>
<html>

<body>

    <h2> Error Handling in JS project</h2>

    <p>This demonstrates how to use <b>catch</b> to display an error.</p>

    <p id="error_message"></p>

    <script>
        try {
            addalert ("Welcome!");
        }
        catch (err) {
            document.getElementById("error_message").innerHTML = err.message;
        }
    </script>

</body>

</html>
